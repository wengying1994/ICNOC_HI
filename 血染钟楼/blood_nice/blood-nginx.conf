server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 血染钟楼所有页面（处理 /blood-crypt/ 路径）
    location /blood-crypt/ {
        alias /usr/share/nginx/html/;
        
        # 房间页面 /blood-crypt/room/xxx/room.html
        location ~ ^/blood-crypt/room/([^/]+)/(.+\.html)$ {
            alias /usr/share/nginx/html/$2;
        }
        
        # 房间页面 /blood-crypt/room/xxx/
        location ~ ^/blood-crypt/room/([^/]+)/?$ {
            alias /usr/share/nginx/html/;
            try_files $uri /room.html;
        }
        
        try_files $uri $uri/ /blood-crypt/index.html;
    }

    # 排行榜页面
    location /leaderboard {
        try_files $uri $uri/ /leaderboard.html;
    }

    # 房间页面
    location /room {
        try_files $uri $uri/ /room.html;
    }

    # 默认首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
