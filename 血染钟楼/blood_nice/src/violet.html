<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫罗兰·梦殒春宵 - 角色说明书</title>
    <style>
        :root {
            --bg-primary: #1a0a2e;
            --bg-secondary: #2d1b4e;
            --bg-card: #3d2a5c;
            --bg-card-hover: #4a3580;
            --text-primary: #f0e6ff;
            --text-secondary: #b8a0d0;
            --accent: #9333ea;
            --accent-light: #c084fc;
            --townfolk: #3b82f6;
            --outsider: #f59e0b;
            --minion: #ef4444;
            --demon: #7c2d12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(147, 51, 234, 0.1) 0%, transparent 50%);
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 20px 30px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #c084fc 0%, #9333ea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .intro {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .intro h2 {
            font-size: 2rem;
            color: var(--accent-light);
            margin-bottom: 15px;
        }

        .intro .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .intro p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .difficulty {
            display: inline-block;
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 20px;
            color: var(--accent-light);
            margin: 15px 0;
        }

        .main-content {
            display: flex;
            min-height: calc(100vh - 200px);
        }

        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            padding: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 200px);
            position: sticky;
            top: 80px;
        }

        .sidebar h3 {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px 0;
            padding-left: 10px;
        }

        .sidebar h3:first-child {
            margin-top: 0;
        }

        .category-townfolk { border-left: 3px solid var(--townfolk); }
        .category-outsider { border-left: 3px solid var(--outsider); }
        .category-minion { border-left: 3px solid var(--minion); }
        .category-demon { border-left: 3px solid #dc2626; }

        .char-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: var(--bg-card);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .char-btn:hover {
            background: var(--bg-card-hover);
            transform: translateX(5px);
        }

        .char-btn.active {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
        }

        .char-btn .emoji {
            margin-right: 8px;
        }

        .detail-panel {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .detail-panel:empty::before {
            content: "👈 请从左侧选择一个角色查看详情";
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .char-detail {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .char-detail.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .char-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-card);
        }

        .char-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-right: 20px;
        }

        .char-icon.townfolk { background: linear-gradient(135deg, var(--townfolk), #1d4ed8); }
        .char-icon.outsider { background: linear-gradient(135deg, var(--outsider), #d97706); }
        .char-icon.minion { background: linear-gradient(135deg, var(--minion), #b91c1c); }
        .char-icon.demon { background: linear-gradient(135deg, #dc2626, #7c2d12); }

        .char-title h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .char-title .type {
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 15px;
            display: inline-block;
        }

        .type.townfolk { background: var(--townfolk); color: white; }
        .type.outsider { background: var(--outsider); color: black; }
        .type.minion { background: var(--minion); color: white; }
        .type.demon { background: #dc2626; color: white; }

        .char-quote {
            font-style: italic;
            color: var(--text-secondary);
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
        }

        .char-section {
            margin-bottom: 25px;
        }

        .char-section h4 {
            font-size: 1.1rem;
            color: var(--accent-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .char-section h4::before {
            content: "◆";
            margin-right: 8px;
            font-size: 0.7rem;
        }

        .char-section p, .char-section li {
            color: var(--text-primary);
            line-height: 1.8;
        }

        .char-section ul {
            padding-left: 25px;
        }

        .char-section li {
            margin-bottom: 8px;
        }

        .ability-box {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(147, 51, 234, 0.3);
        }

        .example-box {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .example-box h5 {
            color: var(--accent-light);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .tips-box {
            background: rgba(147, 51, 234, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed var(--accent);
        }

        .tips-box li {
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .search-box {
            padding: 15px;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: none;
                position: relative;
                top: 0;
            }
            .detail-panel {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>💜 紫罗兰·梦殒春宵</h1>
        <a href="/blood-crypt/" class="back-btn">← 返回首页</a>
    </header>

    <div class="intro">
        <h2>梦殒春宵</h2>
        <p class="subtitle">支持7-15人 / 推荐8-12人</p>
        <div class="difficulty">🎯 难度: 中等</div>
        <p>生机勃勃的春天已然过去，温暖迷人的夏天悄然来临。在人们沉湎于纸醉金迷和灯红酒绿时，黑暗势力却悄然崛起。良辰已至......梦殒春宵。</p>
        <p>善良的角色每晚都能得到惊人的信息。然而，邪恶阵营能够带来的威胁也多种多样，并且可以制造巨大的混乱。</p>
    </div>

    <div class="main-content">
        <aside class="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索角色..." oninput="filterCharacters()">
            </div>

            <h3 class="category-townfolk">镇民 (Townfolk)</h3>
            <div id="townfolkList"></div>

            <h3 class="category-outsider">外来者 (Outsider)</h3>
            <div id="outsiderList"></div>

            <h3 class="category-minion">爪牙 (Minion)</h3>
            <div id="minionList"></div>

            <h3 class="category-demon">恶魔 (Demon)</h3>
            <div id="demonList"></div>
        </aside>

        <main class="detail-panel" id="detailPanel"></main>
    </div>

            const outsiderList = document.getElementById('outsiderList');
            const minionList = document.getElementById('minionList');
            const demonList = document.getElementById('demonList');

            characters.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'char-btn';
                btn.dataset.id = char.id;
                btn.innerHTML = `<span class="emoji">${char.emoji}</span>${char.name}`;
                btn.onclick = () => showCharacter(char.id);

                if (char.category === 'townfolk') townfolkList.appendChild(btn);
                else if (char.category === 'outsider') outsiderList.appendChild(btn);
                else if (char.category === 'minion') minionList.appendChild(btn);
                else if (char.category === 'demon') demonList.appendChild(btn);
            });
        }

        function showCharacter(id) {
            document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-id="${id}"]`).classList.add('active');

            const char = characters.find(c => c.id === id);
            if (!char) return;

            const panel = document.getElementById('detailPanel');
            const typeLabels = {
                townfolk: '镇民',
                outsider: '外来者',
                minion: '爪牙',
                demon: '恶魔'
            };

            panel.innerHTML = `
                <div class="char-detail active">
                    <div class="char-header">
                        <div class="char-icon ${char.category}">${char.emoji}</div>
                        <div class="char-title">
                            <h2>${char.name}</h2>
                            <span class="type ${char.category}">${typeLabels[char.category]}</span>
                        </div>
                    </div>

                    <div class="char-quote">"${char.quote}"</div>

                    <div class="ability-box">
                        <div class="char-section">
                            <h4>能力</h4>
                            <p>${char.ability}</p>
                        </div>
                    </div>

                    ${char.examples.length > 0 ? `
                    <div class="example-box">
                        <h5>📝 范例</h5>
                        <ul>
                            ${char.examples.map(ex => `<li>${ex}</li>`).join('')}
                        </ul>
                    </div>
                    ` : ''}

                    <div class="char-section">
                        <h4>运作方式</h4>
                        <p>${char.howToPlay}</p>
                    </div>

                    ${char.tips.length > 0 ? `
                    <div class="tips-box">
                        <div class="char-section">
                            <h4>💡 提示与技巧</h4>
                            <ul>
                                ${char.tips.map(tip => `<li>${tip}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            panel.scrollTop = 0;
        }

        function filterCharacters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.char-btn').forEach(btn => {
                const name = btn.textContent.toLowerCase();
                btn.style.display = name.includes(query) ? 'block' : 'none';
            });
        }

        // Initialize
        renderCharacterLists();
    </script>
</body>
</html>
