<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫罗兰·梦殒春宵 - 角色说明书</title>
    <style>
        :root {
            --bg-primary: #1a0a2e;
            --bg-secondary: #2d1b4e;
            --bg-card: #3d2a5c;
            --bg-card-hover: #4a3580;
            --text-primary: #f0e6ff;
            --text-secondary: #b8a0d0;
            --accent: #9333ea;
            --accent-light: #c084fc;
            --townfolk: #3b82f6;
            --outsider: #f59e0b;
            --minion: #ef4444;
            --demon: #7c2d12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(147, 51, 234, 0.1) 0%, transparent 50%);
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 20px 30px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(147, 51, 234, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #c084fc 0%, #9333ea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .intro {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .intro h2 {
            font-size: 2rem;
            color: var(--accent-light);
            margin-bottom: 15px;
        }

        .intro .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .intro p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .difficulty {
            display: inline-block;
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 20px;
            color: var(--accent-light);
            margin: 15px 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 200px);
        }

        .sidebar {
            width: 100%;
            background: var(--bg-secondary);
            padding: 20px;
            max-height: none;
            position: relative;
            top: 0;
        }

        .sidebar h3 {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 10px 0;
            padding-left: 10px;
        }

        .sidebar h3:first-child {
            margin-top: 0;
        }

        .category-townfolk { border-left: 3px solid var(--townfolk); }
        .category-outsider { border-left: 3px solid var(--outsider); }
        .category-minion { border-left: 3px solid var(--minion); }
        .category-demon { border-left: 3px solid #dc2626; }

        .char-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .char-btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-card);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .char-btn:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .char-btn.active {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.5);
        }

        .char-btn .emoji {
            margin-right: 6px;
        }

        .detail-panel {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .detail-panel:empty::before {
            content: "👈 请从左侧选择一个角色查看详情";
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .char-detail {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .char-detail.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .char-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-card);
        }

        .char-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-right: 20px;
        }

        .char-icon.townfolk { background: linear-gradient(135deg, var(--townfolk), #1d4ed8); }
        .char-icon.outsider { background: linear-gradient(135deg, var(--outsider), #d97706); }
        .char-icon.minion { background: linear-gradient(135deg, var(--minion), #b91c1c); }
        .char-icon.demon { background: linear-gradient(135deg, #dc2626, #7c2d12); }

        .char-title h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .char-title .type {
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 15px;
            display: inline-block;
        }

        .type.townfolk { background: var(--townfolk); color: white; }
        .type.outsider { background: var(--outsider); color: black; }
        .type.minion { background: var(--minion); color: white; }
        .type.demon { background: #dc2626; color: white; }

        .char-quote {
            font-style: italic;
            color: var(--text-secondary);
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
        }

        .char-section {
            margin-bottom: 25px;
        }

        .char-section h4 {
            font-size: 1.1rem;
            color: var(--accent-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .char-section h4::before {
            content: "◆";
            margin-right: 8px;
            font-size: 0.7rem;
        }

        .char-section p, .char-section li {
            color: var(--text-primary);
            line-height: 1.8;
        }

        .char-section ul {
            padding-left: 25px;
        }

        .char-section li {
            margin-bottom: 8px;
        }

        .ability-box {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(147, 51, 234, 0.3);
        }

        .example-box {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .example-box h5 {
            color: var(--accent-light);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .tips-box {
            background: rgba(147, 51, 234, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed var(--accent);
        }

        .tips-box li {
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .search-box {
            padding: 15px;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

    </style>
</head>
<body>
    <header class="header">
        <h1>💜 紫罗兰·梦殒春宵</h1>
        <a href="/blood-crypt/" class="back-btn">← 返回首页</a>
    </header>

    <div class="intro">
        <h2>梦殒春宵</h2>
        <p class="subtitle">支持7-15人 / 推荐8-12人</p>
        <div class="difficulty">🎯 难度: 中等</div>
        <p>生机勃勃的春天已然过去，温暖迷人的夏天悄然来临。在人们沉湎于纸醉金迷和灯红酒绿时，黑暗势力却悄然崛起。良辰已至......梦殒春宵。</p>
        <p>善良的角色每晚都能得到惊人的信息。然而，邪恶阵营能够带来的威胁也多种多样，并且可以制造巨大的混乱。</p>
    </div>

    <div class="main-content">
        <aside class="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索角色..." oninput="filterCharacters()">
            </div>

            <h3 class="category-townfolk">镇民 (Townfolk)</h3>
            <div id="townfolkList"></div>

            <h3 class="category-outsider">外来者 (Outsider)</h3>
            <div id="outsiderList"></div>

            <h3 class="category-minion">爪牙 (Minion)</h3>
            <div id="minionList"></div>

            <h3 class="category-demon">恶魔 (Demon)</h3>
            <div id="demonList"></div>
        </aside>

        <main class="detail-panel" id="detailPanel"></main>
    </div>

    <script>
        const characters = [
            // 镇民
            {
                id: "clockmaker",
                name: "钟表匠",
                emoji: "🕐",
                category: "townfolk",
                quote: "不要打扰我。时钟的滴答声必须延续下去，它的每一圈循环都象征着生命...",
                ability: "在你的首个夜晚，你会得知恶魔与爪牙之间最近的距离。(邻座的玩家距离为1)",
                examples: [
                    "方古坐在麻脸巫婆旁边。钟表匠得知了\"1\"。",
                    "方古与两名旅行者相邻，一善一恶。洗脑师与其中一名旅行者相邻。在第一个晚上，钟表匠得知了\"2\"。"
                ],
                howToPlay: "在第一个夜晚，唤醒钟表匠。对他用手势比划数字来表示恶魔与爪牙之间最近的距离(1，2，3等)。让钟表匠重新入睡。",
                tips: [
                    "你不必立即提供你的信息;等待一两天以便你可以在邪恶阵营放松警惕的时候观察其他玩家来发现可疑之处。",
                    "如果你能找出一个爪牙那么你的信息将会变得非常有用。弄清楚谁是爪牙，你就可以确定谁更有嫌疑是恶魔。你需要和其他善良角色合作尝试揭露真相。许多玩家有着辨识出邪恶阵营的能力(如神谕者和女裁缝)或是辨识恶魔与爪牙的能力(如卖花女孩、城镇公告员甚至是舞蛇人)。",
                    "如果你得到一个特别大的数字(>3)，那么爪牙们很可能坐的很近并离恶魔很远。同样的如果你得到一个很小的数字(<2)，那么其中一个爪牙里恶魔的距离很近。你可以利用这些信息来观察他们是否有对话，或有其他玩家的互动与你的信息匹配。如果你有怀疑是恶魔的对象，你可以利用你的信息来寻找可能是爪牙的玩家，然后观察他们，他们提供的信息以及有什么信息是关于他们的。相比于恶魔(知道三个不在场角色)爪牙们倾向于努力的隐藏自己，你可以好好利用爪牙们的弱点来确认谁是恶魔。",
                    "你的信息将随着游戏推进以及玩家逐渐死亡变得越发的有用。由于邪恶的玩家不太可能会在夜晚时死去，他们往往想要活的更长来互相支持对方以及他们的观点，因此他们相比于游戏开始时会变得越来越容易暴露。观察仍然活着的玩家中是否能匹配你的信息;如果他们在暗中支持对方，那么他们很有可能是潜藏的邪恶玩家。",
                    "所有你即将面对的爪牙都有明显的表现，也就是说即使他们死了，也会有明显的现象。如果你注意到突然间没有人再因为女巫诅咒而死，被洗脑师洗脑，或者因为麻脸巫婆改变角色，那么很有可能你们已经处决了这些爪牙。弄清楚这些可以让你回推出谁会是恶魔!镜像双子是一个例外，因为你通常会在很早的时候就得知他们在场。这也意味着你可能在很早就确定(最多)四个有可能是恶魔的玩家。"
                ]
            },
            {
                id: "dreamer",
                name: "筑梦师",
                emoji: "💭",
                category: "townfolk",
                quote: "我记得有钟表匠......天空是红色的，有不规则的三角形不断从天上坠落下来...",
                ability: "每个夜晚，你要选择除你及旅行者以外的一名玩家:你会得知一个善良角色和一个邪恶角色，该玩家是其中一个角色。",
                examples: [
                    "筑梦师选择一名玩家，该玩家是畸形秀演员。筑梦师得知该玩家是畸形秀演员或洗脑师。",
                    "筑梦师选择了一名获得了卖花女孩能力的哲学家。筑梦师得知该玩家要么是哲学家，要么是亡骨魔。"
                ],
                howToPlay: "每个夜晚，唤醒筑梦师。让他指向除自己和旅行者外的任意一名玩家。如果被选择的玩家的真实角色是镇民或外来者，向筑梦师展示他的真实角色和任意一个爪牙或恶魔角色标记。让筑梦师重新入睡。",
                tips: [
                    "每次你选择一名玩家，你就会得知他潜在的一种邪恶角色的可能性。请关注这些信息，因为这会给你带来惊人的信息量，哪怕这是错误的信息。例如，任何潜在角色是爪牙的玩家将不太可能是恶魔，所以你可以将他们从你嫌疑名单上划掉。",
                    "你的信息可以绝佳的辨识出是否受到涡流或诺-达鲺影响，因为和其他玩家不同，你的信息可以非常容易证实是否正确。如果你得知的一名玩家的信息不太合理，那么你就要保持怀疑了。如果你得到更多玩家的信息都不合理?那么你就要寻找其他的可能性。",
                    "试着去选择没有和你邻座的玩家。如果你和诺-达鲺邻座，你就会中毒，那么你的信息就会对于恶魔有利。通过选择离你更远的玩家，你会选中邪恶玩家获得关于他们的不可靠信息的可能性就会小的多。(当然你仍然可以在后续去选择你的邻座玩家)",
                    "在游戏早期提供你的信息将更有帮助。很少有玩家会直接公布他的角色，因为邪恶玩家们需要时间来配合，那么你就有绝佳的时机来证实你是一个善良玩家。",
                    "当与你选择的玩家交换信息的时候，谨慎于先透露你的信息。如果你对一名邪恶玩家这么做，那么很可能你会给他提供一个可能伪装的角色。取而代之的是，让他透露他的角色给你，来看是否与你的信息匹配。",
                    "如果你选择在交换信息时先透露你的信息，那么这将很明确的证实你的筑梦师角色......提供你的消息当然也是不错的选择。这将使对方对你有更多的信任，因为除此之外很难获取这样的信息。",
                    "鼓励玩家们不要过早的揭示自己的角色。如果有人声明了他的角色，你仍然可以去做检查，但是如果所有人都公开了他们的角色，那你就很难去证明自己了。",
                    "相比于你认为说了真话的玩家，可以去检查那些你认为在说谎的玩家。将玩家从谎言中抓出的体验是很棒的，因为你会得知这个邪恶玩家的角色，如果你想让他死去，你可以立即公布这个信息。",
                    "可以选择你认为说真话的玩家;不仅这让他更受到支持，而且如果你发现你的信息错误，你可以去怀疑是否有什么其他原因导致了这一切。",
                    "你永远不会得到涡流这个角色，因为如果涡流在场你必定获得错误信息。",
                    "如果场上有一对镜像双子角色，不用去检查他们。你很可能会得到镜像双子中善良与邪恶的角色......这将毫无用处。有一个例外:你可以借此发现是否有涡流在场。"
                ]
            },
            {
                id: "snakecharmer",
                name: "舞蛇人",
                emoji: "🐍",
                category: "townfolk",
                quote: "这位老爷.....虽然我的烟斗是金色的，虽然我只要一首曲子就能驯服最狂野的灯神，但我只是一个卑贱的舞蛇人罢了...",
                ability: "每个夜晚，你要选择一名存活的玩家:如果你选中了恶魔，你和他交换角色和阵营，然后他中毒。",
                examples: [
                    "舞蛇人选择的玩家是亡骨魔。舞蛇人立即变成邪恶的亡骨魔，曾经是亡骨魔的玩家变成善良的舞蛇人并中毒。"
                ],
                howToPlay: "每个夜晚，唤醒舞蛇人。让他指向任意一名存活玩家。如果被选择的玩家不是恶魔，则无事发生。如果被选择的玩家是恶魔，旧的舞蛇人变为新的(邪恶)恶魔。让新恶魔重新入睡。",
                tips: [
                    "舞蛇人存在双重可能性。在任何可能的时候，你可能变为邪恶转而开始背叛你的队伍。而在此之前，你是一名善良玩家，你的信息也极其有用(知道谁不是恶魔与知道谁是恶魔同样重要!)。不像其他玩家，你并不为了你的队伍，而是为了你自己，或者说为游戏结束时你所在的阵营。",
                    "谨慎一点;只选择少数玩家来确认不是恶魔。瞄准那些你认为会存活一段时间的玩家-如果在最后一天还活着的玩家中有你知道不是恶魔的，那么你们将从3选一变为2选1!一旦你对自己收集到的信息感到满足了(或者你并不想再冒险了)，请记住你可以在晚上选择自己来避免成为恶魔!",
                    "大胆一点;选择尽可能多的玩家，你确认不是恶魔的玩家越多你就越强大!这种方法会提高你成为恶魔的概率，但如果你整局游戏都是善良阵营，那么你将拥有强大的力量来对抗邪恶阵营。然而如果你变邪恶了......我相信如果你这么做的话你也不会担心遇到这样的情况不是吗?",
                    "不要告诉任何人你是舞蛇人，除非你确信你自己不会变为恶魔。即使你小心翼翼，你仍然有可能一不小心变为邪恶阵营。被你偷走恶魔角色的玩家现在是善良阵营，他会提供大量所发生的信息，如果此时有任何人知道你是舞蛇人，你会面临巨大的麻烦。尝试不揭露自己的角色直到死亡，或者你决定不再选择新的玩家。",
                    "请牢记每个你选择的玩家如果没有使你交换角色，那么他不是恶魔。在验证恶魔时，你比占卜师更加精确......只要你能够让团队相信你。",

                    "你可以说服场上没有涡流，让他们不要处决玩家来证明这一点，但是这是非常困难的。这通常需要一个非常强有力的能力来说服大家，例如艺术家或者筑梦师，他们可以比其他能力更好的判断出是否自己得到了错误的信息。除非你真的觉得好人方会接受你的这个逻辑/行为，不然不要做这种冒险的举动。",
                    "在你展示你的伪装信息之前，先了解一下好人玩家都有什么角色在场--你可能会根据他们的动作改变你的策略。如果善良的玩家发现了你存在于游戏之中，并开始寻找不符合这种说法的人，那么带着真实信息出现在视野之中可能会适得其反!",
                    "告诉你的爪牙你是哪个恶魔--他们也可能会收集角色的信息知道你的能力在场上发挥作用是很重要的，因为他们可能会调整他们的伪装信息来使自己值得相信。"
                ]
            }
        ];

        function renderCharacterLists() {
            const townfolkList = document.getElementById('townfolkList');
            const outsiderList = document.getElementById('outsiderList');
            const minionList = document.getElementById('minionList');
            const demonList = document.getElementById('demonList');

            characters.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'char-btn';
                btn.dataset.id = char.id;
                btn.innerHTML = `<span class="emoji">${char.emoji}</span>${char.name}`;
                btn.onclick = () => showCharacter(char.id);

                if (char.category === 'townfolk') townfolkList.appendChild(btn);
                else if (char.category === 'outsider') outsiderList.appendChild(btn);
                else if (char.category === 'minion') minionList.appendChild(btn);
                else if (char.category === 'demon') demonList.appendChild(btn);
            });
        }

        function showCharacter(id) {
            document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-id="${id}"]`).classList.add('active');

            const char = characters.find(c => c.id === id);
            if (!char) return;

            const panel = document.getElementById('detailPanel');
            const typeLabels = {
                townfolk: '镇民',
                outsider: '外来者',
                minion: '爪牙',
                demon: '恶魔'
            };

            panel.innerHTML = `
                <div class="char-detail active">
                    <div class="char-header">
                        <div class="char-icon ${char.category}">${char.emoji}</div>
                        <div class="char-title">
                            <h2>${char.name}</h2>
                            <span class="type ${char.category}">${typeLabels[char.category]}</span>
                        </div>
                    </div>

                    <div class="char-quote">"${char.quote}"</div>

                    <div class="ability-box">
                        <div class="char-section">
                            <h4>能力</h4>
                            <p>${char.ability}</p>
                        </div>
                    </div>

                    ${char.examples.length > 0 ? `
                    <div class="example-box">
                        <h5>📝 范例</h5>
                        <ul>
                            ${char.examples.map(ex => `<li>${ex}</li>`).join('')}
                        </ul>
                    </div>
                    ` : ''}

                    <div class="char-section">
                        <h4>运作方式</h4>
                        <p>${char.howToPlay}</p>
                    </div>

                    ${char.tips.length > 0 ? `
                    <div class="tips-box">
                        <div class="char-section">
                            <h4>💡 提示与技巧</h4>
                            <ul>
                                ${char.tips.map(tip => `<li>${tip}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            panel.scrollTop = 0;
        }

        function filterCharacters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.char-btn').forEach(btn => {
                const name = btn.textContent.toLowerCase();
                btn.style.display = name.includes(query) ? 'block' : 'none';
            });
        }

        // Initialize
        renderCharacterLists();
    </script>
</body>
</html>
