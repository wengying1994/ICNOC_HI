<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗流涌动 - 角色说明书</title>
    <style>
        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #132238;
            --bg-card: #1a3050;
            --bg-card-hover: #234568;
            --text-primary: #e6f0ff;
            --text-secondary: #8ba3c7;
            --accent: #2563eb;
            --accent-light: #60a5fa;
            --townfolk: #3b82f6;
            --outsider: #f59e0b;
            --minion: #ef4444;
            --demon: #7c2d12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(37, 99, 235, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 50%);
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            padding: 20px 30px;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            padding: 10px 20px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--accent-light);
            transform: translateY(-2px);
        }

        .intro {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .intro h2 {
            font-size: 2rem;
            color: var(--accent-light);
            margin-bottom: 15px;
        }

        .intro .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .intro p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .difficulty {
            display: inline-block;
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 20px;
            color: var(--accent-light);
            margin: 15px 0;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 200px);
        }

        .sidebar {
            width: 100%;
            background: var(--bg-secondary);
            padding: 20px;
            max-height: none;
            position: relative;
            top: 0;
        }

        .sidebar h3 {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 10px 0;
            padding-left: 10px;
        }

        .sidebar h3:first-child {
            margin-top: 0;
        }

        .category-townfolk { border-left: 3px solid var(--townfolk); }
        .category-outsider { border-left: 3px solid var(--outsider); }
        .category-minion { border-left: 3px solid var(--minion); }
        .category-demon { border-left: 3px solid #dc2626; }
        .category-traveler { border-left: 3px solid #10b981; }

        .char-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .char-btn {
            display: inline-flex;
            align-items: center;
            padding: 10px 14px;
            background: var(--bg-card);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .char-btn:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
        }

        .char-btn.active {
            background: var(--accent);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.5);
        }

        .char-btn .emoji {
            margin-right: 6px;
        }

        .detail-panel {
            flex: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .detail-panel:empty::before {
            content: "👈 请从左侧选择一个角色查看详情";
            display: flex;
            align-items: center;
            justify-content: center;
            height: 300px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .char-detail {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .char-detail.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .char-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--bg-card);
        }

        .char-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-right: 20px;
        }

        .char-icon.townfolk { background: linear-gradient(135deg, var(--townfolk), #1d4ed8); }
        .char-icon.outsider { background: linear-gradient(135deg, var(--outsider), #d97706); }
        .char-icon.minion { background: linear-gradient(135deg, var(--minion), #b91c1c); }
        .char-icon.demon { background: linear-gradient(135deg, #dc2626, #7c2d12); }
        .char-icon.traveler { background: linear-gradient(135deg, #10b981, #059669); }

        .char-title h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .char-title .type {
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 15px;
            display: inline-block;
        }

        .type.townfolk { background: var(--townfolk); color: white; }
        .type.outsider { background: var(--outsider); color: black; }
        .type.minion { background: var(--minion); color: white; }
        .type.demon { background: #dc2626; color: white; }
        .type.traveler { background: #10b981; color: white; }

        .char-quote {
            font-style: italic;
            color: var(--text-secondary);
            padding: 15px 20px;
            background: var(--bg-card);
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid var(--accent);
        }

        .char-section {
            margin-bottom: 25px;
        }

        .char-section h4 {
            font-size: 1.1rem;
            color: var(--accent-light);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .char-section h4::before {
            content: "◆";
            margin-right: 8px;
            font-size: 0.7rem;
        }

        .char-section p, .char-section li {
            color: var(--text-primary);
            line-height: 1.8;
        }

        .char-section ul {
            padding-left: 25px;
        }

        .char-section li {
            margin-bottom: 8px;
        }

        .ability-box {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(37, 99, 235, 0.3);
        }

        .example-box {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .example-box h5 {
            color: var(--accent-light);
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .tips-box {
            background: rgba(37, 99, 235, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 1px dashed var(--accent);
        }

        .tips-box li {
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .search-box {
            padding: 15px;
            margin-bottom: 15px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

    </style>
</head>
<body>
    <header class="header">
        <h1>🌊 暗流涌动</h1>
        <a href="/blood-crypt/" class="back-btn">← 返回首页</a>
    </header>

    <div class="intro">
        <h2>暗流涌动</h2>
        <p class="subtitle">支持7-15人 / 推荐8-12人</p>
        <div class="difficulty">🎯 难度: 初学者</div>
        <p>乌云在鸦木布拉夫的天空中翻滚着，让这个沉睡中的小镇和迷信的居民们笼罩在不祥的阴影之中。当远处的地平线上雷声响起时，焦虑的母亲们把玩耍中的孩子唤回家中。</p>
        <p>善良与邪恶双方都可以适时做出牺牲以占据上风。善良玩家需要运用逻辑与直觉来分辨正邪。邪恶玩家需要伪装成善良玩家，必要时还要给出错误的信息来迷惑善良阵营。</p>
    </div>

    <div class="main-content">
        <aside class="sidebar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索角色..." oninput="filterCharacters()">
            </div>

            <h3 class="category-townfolk">镇民 (Townfolk)</h3>
            <div id="townfolkList"></div>

            <h3 class="category-outsider">外来者 (Outsider)</h3>
            <div id="outsiderList"></div>

            <h3 class="category-minion">爪牙 (Minion)</h3>
            <div id="minionList"></div>

            <h3 class="category-demon">恶魔 (Demon)</h3>
            <div id="demonList"></div>

            <h3 class="category-traveler">旅行者 (Traveler)</h3>
            <div id="travelerList"></div>
        </aside>

        <main class="detail-panel" id="detailPanel"></main>
    </div>

    <script>
        const characters = [
            {
                id: "washerwoman",
                name: "洗衣妇",
                emoji: "👕",
                category: "townfolk",
                quote: "晚礼服上的血渍?才不是呢，这只是洒上了雪莉酒。真粗心!",
                ability: "在你的首个夜晚，你会得知两名玩家和一个镇民角色:这两名玩家之一是该角色。",
                examples: [
                    "小文是厨师，小米是守鸦人。洗衣妇得知要么小文是厨师，要么小米是厨师。",
                    "小佳是小恶魔，小艾是贞洁者。洗衣妇得知要么小佳是贞洁者，要么小艾是贞洁者。",
                    "小明是间谍，小美是红唇女郎。洗衣妇得知他俩其中一人是守鸦人。此时，间谍被当作了一名镇民。"
                ],
                howToPlay: "在为首个夜晚进行准备时，将洗衣妇的「镇民」提示标记放置在任意一个镇民角色标记旁，然后将洗衣妇的「错误」提示标记放置在任意其他角色标记旁。在首个夜晚里，唤醒洗衣妇，并指向标记有「镇民」和「错误」的玩家。将标记有「镇民」的玩家标记展示给洗衣妇。让洗衣妇重新入睡。",
                tips: ["洗衣妇这个角色看起来非常强大。虽然你无法从邪恶阵营的玩家身上获取信息，但你能够确定一个善良角色。你需要时刻关注这个善良角色，因为一旦他获得了有用的信息，就等同于你也得到了这手信息。", "与其他角色相比，处于醉酒或中毒状态的洗衣妇还是比较容易发现自己获取了错误信息的。", "要去识别这两位玩家中哪一位是镇民的方法，不是在公聊时直接问他们，也不是去挨个私聊。最好的方式是在其中一位玩家被质疑时告诉其他玩家你所知道的信息，而且最好在他们自曝之前说出来，这样能够让他们更加相信你。", "如果你在第一天就选择分享你的信息并且很快将它们说出来，善良阵营玩家就能够获得一个坚实的推理基础。这在你查验到场上存在其他信息获取类镇民角色(如占卜师或共情者)时非常有效。", "等到游戏的最后一个白天(或在游戏后期)去分享你的信息也会非常有用。如果你能保证你查验到的镇民能活到最后一天，你就能在剩余存活玩家中排除一个恶魔!", "与你所查验到的镇民玩家交流，并且秘密地让他知晓你得知了他的角色。这样，你就有机会和他组成同盟，并且能够在其中一人被提名时互相替对方辩护。"]
            },
            {
                id: "librarian",
                name: "图书管理员",
                emoji: "📚",
                category: "townfolk",
                quote: "毫无疑问，这位女士，在通常情况下，你可以从图书馆的馆藏中借阅《凶恶药典》。然而，你看起来不像是会员。",
                ability: "在你的首个夜晚，你会得知两名玩家和一个外来者角色:这两名玩家之一是该角色(或者你会得知没有外来者在场)。",
                examples: [
                    "小八是圣徒，小莱是男爵。图书管理员得知要么小八是圣徒，要么小莱是圣徒。",
                    "说书人决定将陌客当作一名爪牙而不是外来者。现在场上没有其他外来者了。图书管理员得知了「0」。",
                    "小黑是酒鬼，且以为自己是僧侣。图书管理员得知要么小黑是酒鬼，要么道哥是酒鬼。"
                ],
                howToPlay: "在为首个夜晚进行准备时，将图书管理员的「外来者」提示标记放置在任意一个外来者角色标记旁，然后将图书管理员的「错误」提示标记放置在任意其他角色标记旁。在首个夜晚里，唤醒图书管理员，并指向标记有「外来者」和「错误」的玩家。",
                tips: ["找出两位玩家当中哪一位是你所知道的那位外来者非常重要。这位玩家虽说是外来者，但也是善良阵营的玩家。虽说他的能力有可能对善良阵营产生不利影响，但是他肯定会站在善良阵营的角度投票，而且你也能确定他不是恶魔。", "如果你获取到的信息是「0」，这将非常有用，但是你要首先保证你没有醉酒或是中毒。这条信息不但排除了场上外来者的存在，还帮你排除了场上出现男爵的可能。", "你会在游戏的第一晚获得信息。尽早公布信息将有助于你确定善良角色，而且也能用你的信息来证实其他镇民(像占卜师或是守鸦人)的信息。", "如果你在游戏的后期还没有公布你的信息(且你得知的那个角色仍然存活)，你就可以在最后一天或者临近最后一天的时候选择公布。这样的话，你知晓的那位玩家就可以被排除恶魔嫌疑了。"]
            },
            {
                id: "investigator",
                name: "调查员",
                emoji: "🔍",
                category: "townfolk",
                quote: "这真是个散步的好夜晚，您说呢，莫罗佐夫先生?还是我应该称呼您为......莫罗佐夫男爵?",
                ability: "在你的首个夜晚，你会得知两名玩家和一个爪牙角色:这两名玩家之一是该角色(或者你会得知没有爪牙在场)。",
                examples: [
                    "小米是男爵，小佳是镇长。调查员得知要么小米是男爵要么小佳是男爵。",
                    "小兰是间谍，小莱是投毒者。调查员得知要么小兰是间谍，要么小莱是间谍。",
                    "小文是陌客，小明是小恶魔。调查员得知要么小文是投毒者，要么小明是投毒者。此时，陌客被当作了一名爪牙。"
                ],
                howToPlay: "在为首个夜晚进行准备时，将调查员的「爪牙」提示标记放置在任意一个爪牙角色标记旁，然后将调查员的「错误」提示标记放置在任意其他角色标记旁。在首个夜晚里，唤醒调查员，并指向标记有「爪牙」和「错误」的玩家。",
                tips: ["与其被处决，圣徒这样的角色宁可死在晚上。外来者一般不是恶魔的首要击杀对象，因此你可以通过你的信息让外来者先被杀死，这样可以保护一个更强大的角色(如共情者或占卜师)免受侵害。", "又或者，你可以故意给出谁是酒鬼的错误信息。因为恶魔通常不太愿意去攻击一个酒鬼，这样你就能够保护一个正常的能获取信息的镇民，而恶魔就有可能去攻击那个真正的酒鬼。", "不加顾虑地给出你的信息可能会让其他人相信你，但是这不代表你也需要相信他们。总可能有邪恶阵营的玩家来对你表示赞成，但他们做这些只是为了让自己伪装得更加善良。", "相反的，要求其他玩家对你表明自身意味着你能够相信他们，但不代表他们会相信你。在这种情况下，你可以试着去找一个平衡点，让你们两个的信息都看起来比较合理。"]
            },
            {
                id: "cook",
                name: "厨师",
                emoji: "👨‍🍳",
                category: "townfolk",
                quote: "今晚的预约有些古怪。我从未见过梅威瑟太太此前跟那个哈德逊巷的流氓有过交情。然而今晚，他们订了一张双人桌。真奇怪。",
                ability: "在你的首个夜晚，你会得知场上邻座的邪恶玩家有多少对。",
                examples: [
                    "没有邪恶玩家相邻而坐。厨师得知了「0」。",
                    "小恶魔与男爵相邻而坐。在另一侧，投毒者与红唇女郎相邻而坐。厨师得知了「2」。",
                    "邪恶的替罪羊坐在小恶魔与红唇女郎的中间。在另一侧，投毒者与男爵相邻而坐。厨师得知了「3」。"

                howToPlay: "在首个夜晚里，唤醒厨师。为厨师用手势比划场上互为邻座的邪恶玩家有多少对(0，1，2，等等)。让厨师重新入睡。",
                tips: ["在游戏开始，单看你自己的信息并不是非常有用，但如果你将你的信息与你队友的信息相结合，就会变得非常有用了。", "你的信息随着游戏的进行将会变得越来越有用，所以在关键的时刻记得对善良阵营重申你的信息。", "得到信息「0」意味着没有邪恶玩家邻座；记得在白天寻找有哪些窃窃私语的玩家。他们有可能是邪恶阵营，但也有可能只是善良阵营的玩家在进行秘密交流。", "如果你知道邪恶玩家不邻座，并且确信某位玩家是邪恶阵营的，那与他相邻的玩家肯定就是善良阵营的。", "间谍可能不会被当作是邪恶阵营，你可能因此会获得错误的数字。类似的，陌客也有可能被你当作邪恶阵营。"]
            },
            {
                id: "empath",
                name: "共情者",
                emoji: "💗",
                category: "townfolk",
                quote: "我的皮肤有些刺痛。这有些不太对劲。我能感觉得到。",
                ability: "每个夜晚，你会得知与你邻近的两名存活的玩家中邪恶玩家的数量。",
                examples: [
                    "共情者与两名善良玩家相邻--士兵与僧侣。共情者得知了「0」。",
                    "下一天，士兵被处决。在那一晚，僧侣被小恶魔杀死。共情者现在会探查与士兵和僧侣相邻的玩家--图书管理员与邪恶的枪手。共情者得知了「1」。",
                    "在最后一夜里，只有三名玩家存活:共情者，小恶魔与男爵。不论谁坐在何处，共情者均会得知「2」。"

        function renderCharacterLists() {
            const townfolkList = document.getElementById('townfolkList');
            const outsiderList = document.getElementById('outsiderList');
            const minionList = document.getElementById('minionList');
            const demonList = document.getElementById('demonList');
            const travelerList = document.getElementById('travelerList');

            characters.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'char-btn';
                btn.dataset.id = char.id;
                btn.innerHTML = `<span class="emoji">${char.emoji}</span>${char.name}`;
                btn.onclick = () => showCharacter(char.id);

                if (char.category === 'townfolk') townfolkList.appendChild(btn);
                else if (char.category === 'outsider') outsiderList.appendChild(btn);
                else if (char.category === 'minion') minionList.appendChild(btn);
                else if (char.category === 'demon') demonList.appendChild(btn);
                else if (char.category === 'traveler') travelerList.appendChild(btn);
            });
        }

        function showCharacter(id) {
            document.querySelectorAll('.char-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-id="${id}"]`).classList.add('active');

            const char = characters.find(c => c.id === id);
            if (!char) return;

            const panel = document.getElementById('detailPanel');
            const typeLabels = {
                townfolk: '镇民',
                outsider: '外来者',
                minion: '爪牙',
                demon: '恶魔',
                traveler: '旅行者'
            };

            panel.innerHTML = `
                <div class="char-detail active">
                    <div class="char-header">
                        <div class="char-icon ${char.category}">${char.emoji}</div>
                        <div class="char-title">
                            <h2>${char.name}</h2>
                            <span class="type ${char.category}">${typeLabels[char.category]}</span>
                        </div>
                    </div>

                    <div class="char-quote">"${char.quote}"</div>

                    <div class="ability-box">
                        <div class="char-section">
                            <h4>能力</h4>
                            <p>${char.ability}</p>
                        </div>
                    </div>

                    ${char.examples.length > 0 ? `
                    <div class="example-box">
                        <h5>📝 范例</h5>
                        <ul>
                            ${char.examples.map(ex => `<li>${ex}</li>`).join('')}
                        </ul>
                    </div>
                    ` : ''}

                    <div class="char-section">
                        <h4>运作方式</h4>
                        <p>${char.howToPlay}</p>
                    </div>

                    ${char.tips.length > 0 ? `
                    <div class="tips-box">
                        <div class="char-section">
                            <h4>💡 提示与技巧</h4>
                            <ul>
                                ${char.tips.map(tip => `<li>${tip}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            panel.scrollTop = 0;
        }

        function filterCharacters() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.char-btn').forEach(btn => {
                const name = btn.textContent.toLowerCase();
                btn.style.display = name.includes(query) ? 'block' : 'none';
            });
        }

        renderCharacterLists();
    </script>
</body>
</html>
