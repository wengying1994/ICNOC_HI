<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血染钟楼 - 说书人后台</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --success: #4ade80;
            --danger: #ef4444;
            --warning: #fbbf24;
            --purple: #a855f7;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 15px 10px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--accent);
        }
        
        h1 {
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .phase-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .phase-btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .quick-action-btn {
            padding: 8px 14px;
            font-size: 0.9rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: var(--bg-card);
            color: var(--text-primary);
            transition: all 0.3s;
        }
        
        .quick-action-btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }
        
        .phase-btn.day {
            background: var(--bg-card);
            color: var(--warning);
        }
        
        .phase-btn.night {
            background: var(--bg-card);
            color: var(--purple);
        }
        
        .phase-btn.active {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }
        
        .phase-btn.day.active {
            background: var(--warning);
            color: var(--bg-primary);
        }
        
        .phase-btn.night.active {
            background: var(--purple);
            color: white;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card h2 .icon {
            font-size: 1.5rem;
        }
        
        /* Player Form */
        .add-player-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        input, select, textarea {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .add-player-form input[type="number"] {
            width: 70px;
        }
        
        .add-player-form input[type="text"] {
            flex: 1;
            min-width: 100px;
        }
        
        .add-player-form select {
            min-width: 130px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 0.8rem;
        }
        
        /* Player List */
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .player-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .player-item:hover {
            transform: translateX(5px);
        }
        
        .player-number {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent);
            border-radius: 50%;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .player-role {
            flex: 1;
            font-weight: bold;
        }
        
        .player-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-alive {
            background: rgba(74, 222, 128, 0.2);
            color: var(--success);
        }
        
        .status-dead {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }
        
        .status-poisoned {
            background: rgba(251, 191, 36, 0.2);
            color: var(--warning);
        }
        
        .status-dead-poisoned {
            background: rgba(168, 85, 247, 0.2);
            color: var(--purple);
        }
        
        .status-dead-voted {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }
        
        .player-actions {
            display: flex;
            gap: 5px;
        }
        
        .status-select {
            padding: 5px 10px;
            font-size: 0.8rem;
            min-width: 100px;
        }
        
        /* Action Logs */
        .action-log {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }
        
        .log-entry.night {
            border-left-color: var(--purple);
        }
        
        .log-entry.day {
            border-left-color: var(--warning);
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .log-content {
            font-size: 0.95rem;
        }
        
        .log-content strong {
            color: var(--accent);
        }
        
        .log-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .log-input input {
            flex: 1;
        }
        
        .log-input .btn {
            flex-shrink: 0;
        }
        
        /* Night Actions */
        .night-actions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .night-action-btn {
            padding: 15px;
            background: var(--bg-card);
            border: 2px solid var(--purple);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .night-action-btn:hover {
            background: var(--purple);
            transform: translateY(-2px);
        }
        
        .night-action-btn.selected {
            background: var(--purple);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }
        
        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            padding: 10px 20px;
            background: var(--bg-card);
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        /* 定时器样式 */
        .timers {
            display: flex;
            gap: 10px;
            margin-right: 15px;
            align-items: center;
        }
        
        .timer {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg-card);
            padding: 5px 10px;
            border-radius: 8px;
        }
        
        .timer-display {
            font-size: 3rem;
            font-weight: bold;
            font-family: monospace;
            min-width: 80px;
            text-align: center;
            color: #fff;
        }
        
        .timer-display.running {
            color: #4ade80;
        }
        
        .timer-btn {
            padding: 3px 8px;
            font-size: 0.7rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .timer-btn.reset {
            background: #6b7280;
            color: white;
        }
        
        .timer-btn.start-stop {
            background: #3b82f6;
            color: white;
        }
        
        /* 定时器到期弹窗样式 */
        .timer-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .timer-alert-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .timer-alert {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.5);
            transform: scale(0.8);
            transition: transform 0.3s ease;
            max-width: 90%;
        }
        
        .timer-alert-overlay.show .timer-alert {
            transform: scale(1);
        }
        
        .timer-alert h2 {
            margin: 0 0 15px 0;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .timer-alert p {
            margin: 0 0 20px 0;
            font-size: 1.2rem;
            opacity: 0.95;
        }
        
        .timer-alert button {
            background: white;
            color: #dc2626;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .timer-alert button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .timer-btn.start-stop.running {
            background: #ef4444;
        }
        
        .timer-btn:hover {
            opacity: 0.8;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 4px;
        }
        
        .clear-btn {
            margin-top: 20px;
            width: 100%;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
            <div>
                <h1>🕐 血染钟楼 - 说书人后台</h1>
                <p class="subtitle">暗流涌动 · 剧本管理</p>
            </div>
            <div class="stats" style="margin: 0; gap: 15px;">
                <div class="timers">
                    <div class="timer" data-minutes="10">
                        <span class="timer-display" id="timer10">10:00</span>
                        <button class="timer-btn reset" onclick="resetTimer(10)">↺</button>
                        <button class="timer-btn start-stop" id="btn10" onclick="toggleTimer(10)">▶</button>
                    </div>
                    <div class="timer" data-minutes="3">
                        <span class="timer-display" id="timer3">3:00</span>
                        <button class="timer-btn reset" onclick="resetTimer(3)">↺</button>
                        <button class="timer-btn start-stop" id="btn3" onclick="toggleTimer(3)">▶</button>
                    </div>
                    <div class="timer" data-minutes="1">
                        <span class="timer-display" id="timer1">1:00</span>
                        <button class="timer-btn reset" onclick="resetTimer(1)">↺</button>
                        <button class="timer-btn start-stop" id="btn1" onclick="toggleTimer(1)">▶</button>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalPlayers">0</div>
                    <div class="stat-label">总玩家</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="alivePlayers">0</div>
                    <div class="stat-label">存活</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="deadPlayers">0</div>
                    <div class="stat-label">死亡</div>
                </div>
            </div>
        </header>
        
        <div class="grid">
            <!-- 玩家管理 -->
            <div class="card">
                <h2><span class="icon">👥</span> 玩家管理</h2>
                
                <div class="add-player-form">
                    <select id="playerRole">
                        <option value="">角色名</option>
                        <optgroup label="村民">
                            <option value="洗衣妇">🧺 洗衣妇</option>
                            <option value="图书管理员">📚 图书管理员</option>
                            <option value="调查员">🔍 调查员</option>
                            <option value="厨师">👨‍🍳 厨师</option>
                            <option value="共情者">💗 共情者</option>
                            <option value="占卜师">🔮 占卜师</option>
                            <option value="送葬者">⚰️ 送葬者</option>
                            <option value="僧侣">🛡️ 僧侣</option>
                            <option value="乌鸦守卫者">🐦 乌鸦守卫者</option>
                            <option value="处女">👰 处女</option>
                            <option value="猎人">🏹 猎人</option>
                            <option value="士兵">⚔️ 士兵</option>
                            <option value="市长">🎖️ 市长</option>
                        </optgroup>
                        <optgroup label="外来者">
                            <option value="管家">🎩 管家</option>
                            <option value="酒鬼">🍺 酒鬼</option>
                            <option value="隐士">🏕️ 隐士</option>
                            <option value="圣徒">✝️ 圣徒</option>
                        </optgroup>
                        <optgroup label="爪牙">
                            <option value="下毒者">🧪 下毒者</option>
                            <option value="间谍">🕵️ 间谍</option>
                            <option value="绯红夫人">💄 绯红夫人</option>
                            <option value="男爵">🎭 男爵</option>
                        </optgroup>
                        <optgroup label="恶魔">
                            <option value="小恶魔">😈 小恶魔</option>
                        </optgroup>
                    </select>
                    <input type="text" id="playerNote" placeholder="备注">
                    <button class="btn btn-primary" onclick="addPlayer()">+ 添加玩家</button>
                    <button class="btn" style="background: var(--bg-card);" onclick="showImportModal()">📥 批量导入</button>
                </div>
                
                <div id="import-area" style="display:none; margin-bottom: 15px; padding: 15px; background: var(--bg-card); border-radius: 8px;">
                    <textarea id="importText" placeholder="一行一个角色名，例如：
洗衣妇
图书管理员-宿敌
占卜师
酒鬼-调查员" style="width:100%; height:120px; margin-bottom:10px;"></textarea>
                    <button class="btn btn-primary" onclick="importPlayers()">确认导入</button>
                    <button class="btn" style="background: var(--bg-card);" onclick="document.getElementById('import-area').style.display='none'">取消</button>
                </div>
                
                <div class="player-list" id="playerList">
                    <div class="empty-state">暂无玩家，请添加</div>
                </div>
                
                <button class="btn btn-danger clear-btn" onclick="clearAllPlayers()">清空所有玩家</button>
            </div>
            
            <!-- 行动记录 -->
            <div class="card">
                <h2><span class="icon">📝</span> 行动记录</h2>
                
                <div class="phase-toggle" style="margin-bottom: 15px; justify-content: flex-start;">
                    <button class="phase-btn day active" onclick="setPhase('day')">☀️ 白天</button>
                    <button class="phase-btn night" onclick="setPhase('night')">🌙 夜间</button>
                    <div id="quickActions" style="display: flex; gap: 8px; margin-left: 20px; padding-left: 20px; border-left: 1px solid rgba(255,255,255,0.2);">
                    </div>
                </div>
                
                <div class="log-input">
                    <input type="text" id="actionInput" placeholder="记录玩家行动..." onkeypress="handleLogKeypress(event)">
                    <button class="btn btn-primary" onclick="addLog()">记录</button>
                </div>
                
                <div class="action-log" id="actionLog" style="margin-top: 15px;">
                    <div class="empty-state">暂无记录</div>
                </div>
                
                <button class="btn btn-danger clear-btn" onclick="clearLogs()">清空记录</button>
                <button class="btn btn-primary clear-btn" style="margin-top: 10px;" onclick="exportReplay()">📖 导出复盘</button>
                <button class="btn btn-secondary clear-btn" style="margin-top: 10px;" onclick="copyToClipboard()">📋 复制到粘贴板</button>
            </div>
        </div>
    </div>
    
    <script>
        // 定时器状态
        const timerState = {
            10: { remaining: 600, interval: null, running: false },
            3: { remaining: 180, interval: null, running: false },
            1: { remaining: 60, interval: null, running: false }
        };
        
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        
        function updateTimerDisplay(minutes) {
            const timer = timerState[minutes];
            const display = document.getElementById(`timer${minutes}`);
            display.textContent = formatTime(timer.remaining);
            display.classList.toggle('running', timer.running);
        }
        
        // 定时器到期弹窗
        function showTimerAlert(minutes) {
            const overlay = document.getElementById('timerAlertOverlay');
            const title = document.getElementById('timerAlertTitle');
            const message = document.getElementById('timerAlertMessage');
            
            title.textContent = `⏰ ${minutes}分钟计时结束！`;
            message.textContent = `定时器已到时，请注意时间！`;
            
            overlay.classList.add('show');
            
            // 播放提示音
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start(audioCtx.currentTime);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }
        
        function closeTimerAlert() {
            document.getElementById('timerAlertOverlay').classList.remove('show');
        }
        
        function toggleTimer(minutes) {
            const timer = timerState[minutes];
            const btn = document.getElementById(`btn${minutes}`);
            
            if (timer.running) {
                clearInterval(timer.interval);
                timer.running = false;
                btn.textContent = '▶';
                btn.classList.remove('running');
            } else {
                timer.running = true;
                timer.interval = setInterval(() => {
                    timer.remaining--;
                    if (timer.remaining <= 0) {
                        clearInterval(timer.interval);
                        timer.running = false;
                        timer.remaining = 0;
                        btn.textContent = '▶';
                        btn.classList.remove('running');
                        showTimerAlert(minutes);
                    }
                    updateTimerDisplay(minutes);
                }, 1000);
                btn.textContent = '⏸';
                btn.classList.add('running');
            }
            updateTimerDisplay(minutes);
        }
        
        function resetTimer(minutes) {
            const timer = timerState[minutes];
            if (timer.running) {
                clearInterval(timer.interval);
                timer.running = false;
                const btn = document.getElementById(`btn${minutes}`);
                btn.textContent = '▶';
                btn.classList.remove('running');
            }
            timer.remaining = minutes * 60;
            updateTimerDisplay(minutes);
        }
        
        // Get room ID from URL
        const roomId = window.location.pathname.split('/')[2] || 'default';
        const STORAGE_KEY = 'bloodClocktowerRoom_' + roomId;
        
        // State
        let state = {
            roomId: roomId,
            roomName: '',
            players: [],
            logs: [],
            currentPhase: 'day'
        };
        
        // Load from localStorage
        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                state = JSON.parse(saved);
                render();
            }
            
            // Update page title
            document.title = '血染钟楼 - ' + (state.roomName || '房间 ' + roomId);
        }
        
        // Save to localStorage
        function saveState() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        
        // Add player
        function addPlayer() {
            const role = document.getElementById('playerRole').value || '未知角色';
            const note = document.getElementById('playerNote').value.trim();
            
            // Auto-increment number
            const maxNum = state.players.reduce((max, p) => Math.max(max, p.number), 0);
            const number = maxNum + 1;
            
            state.players.push({
                number,
                role,
                note,
                status: 'alive' // alive, dead, poisoned, dead-poisoned
            });
            
            state.players.sort((a, b) => a.number - b.number);

        // Show import area
        function showImportModal() {
            const area = document.getElementById('import-area');
            area.style.display = area.style.display === 'none' ? 'block' : 'none';
        }
        
        // Import players
        function importPlayers() {
            const text = document.getElementById('importText').value.trim();
            if (!text) {
                alert('请输入角色名');
                return;
            }
            
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            let maxNum = state.players.reduce((max, p) => Math.max(max, p.number), 0);
            
            lines.forEach(line => {
                maxNum++;
                // 支持格式: 角色名 或 角色名-备注
                let role = line;
                let note = '';
                if (line.includes('-')) {
                    const parts = line.split('-');
                    role = parts[0].trim();
                    note = parts.slice(1).join('-').trim();
                }
                state.players.push({
                    number: maxNum,
                    role: role,
                    note: note,
                    status: 'alive'
                });
            });
            
            document.getElementById('importText').value = '';
            document.getElementById('import-area').style.display = 'none';
            
            saveState();
            render();
            alert('成功导入 ' + lines.length + ' 名玩家！');
        }

            state.players = state.players.filter(p => p.number !== number);
            saveState();
            render();

            '乌鸦守卫者': '🐦', '共情者': '💗', '小恶魔': '😈', '送葬者': '⚰️', '管家': '🎩'

        // Export replay
        function exportReplay() {
            if (state.players.length === 0 && state.logs.length === 0) {
                alert('暂无数据可导出');

            }
            
            // Role emoji map
            const roleEmoji = {

                '共情者': '💗', '占卜师': '🔮', '送葬者': '⚰️', '僧侣': '🛡️',
                '乌鸦守卫者': '🐦', '处女': '👰', '猎人': '🏹', '士兵': '⚔️', '市长': '🎖️',

            replay += `- 导出时间: ${new Date().toLocaleString('zh-CN')}\n\n`;
            
            // Players
            replay += '## 👥 玩家名单\n';
            const statusMap = { 'alive': '存活', 'dead': '死亡', 'poisoned': '中毒', 'dead-poisoned': '死亡+中毒', 'dead-voted': '死亡+已投票' };
            
            if (state.players.length === 0) {
                replay += '(暂无玩家)\n';
            } else {
                // Sort by number
                const sorted = [...state.players].sort((a, b) => a.number - b.number);
                sorted.forEach(p => {
                    const emoji = roleEmoji[p.role] || '';
                    replay += `- 玩家 #${p.number} ${emoji} ${p.role} [${statusMap[p.status]}]`;
                    if (p.note) replay += ` - ${p.note}`;
                    replay += '\n';
                });
            }
            replay += '\n';
            
            // Logs
            replay += '## 📝 行动记录\n';

                replay += '(暂无记录)\n';
            } else {
                state.logs.forEach(l => {
                    const phaseIcon = l.phase === 'night' ? '🌙' : '☀️';
                    replay += `- ${phaseIcon} [${l.time}] ${l.content}\n`;
                });
            }
            
            // Download as file (works on all environments)
            const blob = new Blob([replay], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `血染钟楼_复盘_${new Date().toISOString().slice(0,10)}.md`;
            a.click();

        // Phase
        const dayActions = [
            { type: '提名', emoji: '✋' },
            { type: '处决', emoji: '⚔️' },
            { type: '猎人开枪', emoji: '🔫' }
        ];
        
        const nightActions = [
            { type: '下毒者', emoji: '🧪' },
            { type: '僧侣', emoji: '🛡️' },
            { type: '小恶魔', emoji: '😈' },
            { type: '占卜师', emoji: '🔮' },
            { type: '共情者', emoji: '💗' },
            { type: '送葬者', emoji: '⚰️' },
            { type: '管家', emoji: '🎩' },
            { type: '乌鸦守卫者', emoji: '🐦' }
        ];
        
        function renderQuickActions() {
            const container = document.getElementById('quickActions');
            const actions = state.currentPhase === 'night' ? nightActions : dayActions;
            
            container.innerHTML = actions.map(a => 
                `<button class="quick-action-btn" onclick="quickAction('${a.type}', '${a.emoji}')">${a.emoji} ${a.type}</button>`
            ).join('');
        }
        
        function quickAction(type, emoji) {
            const playerNum = prompt(`${type}\n输入玩家编号 (留空则不记录):`);
            let content = emoji + ' ' + type;
            if (playerNum) {
                content += ` #${playerNum}`;
            }
            
            state.logs.unshift({
                phase: state.currentPhase,
                content,
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            });
            
            saveState();
            render();
        }
        
        function setPhase(phase) {
            state.currentPhase = phase;
            
            document.querySelectorAll('.phase-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.phase-btn.${phase}`).classList.add('active');
            
            renderQuickActions();
            saveState();
        }
        
        // Render
        function render() {
            renderStats();
            renderPlayers();
            renderLogs();
        }
        
        function renderStats() {
            const total = state.players.length;
            const dead = state.players.filter(p => p.status === 'dead' || p.status === 'dead-poisoned' || p.status === 'dead-voted').length;
            const alive = total - dead;
            
            document.getElementById('totalPlayers').textContent = total;
            document.getElementById('alivePlayers').textContent = alive;
            document.getElementById('deadPlayers').textContent = dead;
        }
        
        function renderPlayers() {
            const list = document.getElementById('playerList');
            
            if (state.players.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无玩家，请添加</div>';
                return;
            }
            
            // Role emoji map
            const roleEmoji = {
                '洗衣妇': '🧺', '图书管理员': '📚', '调查员': '🔍', '厨师': '👨‍🍳',
                '共情者': '💗', '占卜师': '🔮', '送葬者': '⚰️', '僧侣': '🛡️',
                '乌鸦守卫者': '🐦', '处女': '👰', '猎人': '🏹', '士兵': '⚔️', '市长': '🎖️',
                '管家': '🎩', '酒鬼': '🍺', '隐士': '🏕️', '圣徒': '✝️',
                '下毒者': '🧪', '间谍': '🕵️', '绯红夫人': '💄', '男爵': '🎭',
                '小恶魔': '😈'
            };
            
            function getRoleEmoji(role) {
                return roleEmoji[role] || '';
            }
            
            // Sort: dead last, keep others in original order
            const deadStatus = ['dead', 'dead-poisoned', 'dead-voted'];
            const sortedPlayers = [...state.players].sort((a, b) => {
                const aDead = deadStatus.includes(a.status) ? 1 : 0;
                const bDead = deadStatus.includes(b.status) ? 1 : 0;
                if (aDead !== bDead) return aDead - bDead;
                return a.number - b.number;
            });
            
            const statusMap = {
                'alive': '存活',
                'dead': '死亡',
                'poisoned': '中毒',
                'dead-poisoned': '死亡+中毒',
                'dead-voted': '死亡+已投票'
            };
            
            list.innerHTML = sortedPlayers.map(p => `
                <div class="player-item">
                    <div class="player-number">${p.number}</div>
                    <div class="player-role" id="player-role-${p.number}">
                        ${getRoleEmoji(p.role)} ${p.role}
                        ${p.note ? `<span style="color: var(--text-secondary); font-size: 0.85rem; font-weight: normal;"> - ${p.note}</span>` : ''}
                    </div>
                    <select class="status-select" onchange="updatePlayerStatus(${p.number}, this.value)">
                        <option value="alive" ${p.status === 'alive' ? 'selected' : ''}>存活</option>
                        <option value="dead" ${p.status === 'dead' ? 'selected' : ''}>死亡</option>
                        <option value="poisoned" ${p.status === 'poisoned' ? 'selected' : ''}>中毒</option>
                        <option value="dead-poisoned" ${p.status === 'dead-poisoned' ? 'selected' : ''}>死亡+中毒</option>
                        <option value="dead-voted" ${p.status === 'dead-voted' ? 'selected' : ''}>死亡+已投票</option>
                    </select>
                    <div class="player-status status-${p.status}">${statusMap[p.status]}</div>
                    <div class="player-actions">
                        <button class="btn btn-primary btn-small" onclick="editPlayer(${p.number})">编辑</button>
                        <button class="btn btn-danger btn-small" onclick="removePlayer(${p.number})">删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderLogs() {
            const log = document.getElementById('actionLog');
            
            if (state.logs.length === 0) {
                log.innerHTML = '<div class="empty-state">暂无记录</div>';
                return;
            }
            
            log.innerHTML = state.logs.map((l, index) => `
                <div class="log-entry ${l.phase}">
                    <div class="log-header">
                        <span>${l.phase === 'night' ? '🌙 夜间' : '☀️ 白天'}</span>
                        <span>
                            <span style="margin-right: 10px; color: var(--text-secondary); font-size: 0.8rem;">${l.time}</span>
                            <span onclick="moveLogUp(${index})" style="cursor:pointer; margin-right: 5px;" title="上移" ${index === 0 ? 'style="cursor:not-allowed;opacity:0.3;"' : ''}>⬆️</span>
                            <span onclick="moveLogDown(${index})" style="cursor:pointer; margin-right: 5px;" title="下移" ${index === state.logs.length - 1 ? 'style="cursor:not-allowed;opacity:0.3;"' : ''}>⬇️</span>
                            <span onclick="deleteLog(${index})" style="cursor:pointer; color: var(--danger);" title="删除">🗑️</span>
                        </span>
                    </div>
                    <div class="log-content" onclick="editLog(${index})" style="cursor:pointer;">${l.content}</div>
                </div>
            `).join('');
        }
        
        // Move log up
        function moveLogUp(index) {
            if (index === 0) return;
            const temp = state.logs[index];
            state.logs[index] = state.logs[index - 1];
            state.logs[index - 1] = temp;
            saveState();
            render();
        }
        
        // Move log down
        function moveLogDown(index) {
            if (index === state.logs.length - 1) return;
            const temp = state.logs[index];
            state.logs[index] = state.logs[index + 1];
            state.logs[index + 1] = temp;
            saveState();
            render();
        }
        
        // Delete log
        function deleteLog(index) {
            if (confirm('确定删除这条记录吗？')) {
                state.logs.splice(index, 1);
                saveState();
                render();
            }
        }
        
        // Edit log
        function editLog(index) {
            const log = state.logs[index];
            if (!log) return;
            
            const newContent = prompt('编辑记录:', log.content);
            if (newContent === null) return;
            
            log.content = newContent.trim() || log.content;
            saveState();
            render();
        }
        
        // Initialize
        loadState();
        renderQuickActions();
    </script>
