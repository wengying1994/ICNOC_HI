<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 玩家排名 - 血染钟楼</title>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --accent: #e94560;
            --accent-hover: #ff6b6b;
            --success: #4ade80;
            --warning: #fbbf24;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1a 100%);
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .add-player-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input, select {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--accent);
        }
        
        .btn-secondary:hover {
            background: var(--accent);
        }
        
        .btn-success {
            background: var(--success);
            color: #000;
        }
        
        .btn-danger {
            background: var(--accent);
            color: white;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.9rem;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        th.rank-col { width: 60px; }
        th.name-col { width: 150px; }
        th.score-col { width: 150px; }
        th.action-col { width: 100px; }
        
        .rank {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .rank-1 { color: #ffd700; }
        .rank-2 { color: #c0c0c0; }
        .rank-3 { color: #cd7f32; }
        
        .player-name {
            font-size: 1rem;
            font-weight: 500;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .score-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        
        .score-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .win-btn {
            background: var(--success);
            color: #000;
        }
        
        .win-btn:hover {
            background: #22c55e;
            transform: scale(1.1);
        }
        
        .lose-btn {
            background: var(--accent);
            color: white;
        }
        
        .lose-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.1);
        }
        
        .score-num {
            min-width: 30px;
            text-align: center;
            font-weight: bold;
        }
        
        .win-num { color: var(--success); }
        .lose-num { color: var(--accent); }
        
        .reset-btn {
            background: transparent;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-right: 5px;
        }
        
        .reset-btn:hover {
            background: #fbbf24;
            color: white;
        }
        
        .delete-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .clear-all {
            text-align: right;
            margin-top: 10px;
        }
        
        .clear-all button {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .clear-all button:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        
        <h1>🏆 玩家排名榜</h1>
        <p class="subtitle">记录玩家胜负数据，胜利次数多的排前面</p>
        
        <!-- 排行榜 -->
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th class="rank-col">排名</th>
                        <th class="name-col">玩家</th>
                        <th class="score-col">胜利次数</th>
                        <th class="action-col">操作</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
            
            <div class="empty-state" id="emptyState" style="display: none;">
                暂无玩家数据，请添加玩家
            </div>
        </div>
        
        <!-- 管理功能 -->
        <div class="card">
            <h3 style="margin-bottom: 15px; color: var(--text-secondary);">➕ 添加玩家</h3>
            <div class="add-player-form">
                <input type="text" id="playerName" placeholder="输入玩家称呼 (如: 大神炅炅)">
                <button class="btn btn-primary" onclick="addPlayer()">添加</button>
            </div>
            

        </div>
    </div>
    
    <script>
        const API_BASE = '/api';
        let players = [];
        
        // 从服务器获取排名数据
        async function fetchPlayers() {
            try {
                const res = await fetch(`${API_BASE}/players`);
                players = await res.json();
            } catch (e) {
                console.error('获取数据失败:', e);
                players = [];
            }
        }
        
        // 添加玩家
        async function addPlayer() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value.trim();
            
            if (!name) {
                alert('请输入玩家称呼');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/players`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    alert(err.error || '添加失败');
                    return;
                }
                
                nameInput.value = '';
                await fetchPlayers();
                renderLeaderboard();
            } catch (e) {
                alert('添加失败: ' + e.message);
            }
        }
        
        // 增加胜利次数
        async function addWin(index) {
            const player = players[index];
            try {
                await fetch(`${API_BASE}/players/${encodeURIComponent(player.name)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wins: player.wins + 1 })
                });
                await fetchPlayers();
                renderLeaderboard();
            } catch (e) {
                alert('操作失败: ' + e.message);
            }
        }
        
        // 减少胜利次数
        async function subtractWin(index) {
            const player = players[index];
            if (player.wins <= 0) return;
            
            try {
                await fetch(`${API_BASE}/players/${encodeURIComponent(player.name)}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ wins: player.wins - 1 })
                });
                await fetchPlayers();
                renderLeaderboard();
            } catch (e) {
                alert('操作失败: ' + e.message);
            }
        }
        
        // 删除玩家
        async function deletePlayer(index) {
            if (!confirm('确定删除该玩家吗？')) return;
            
            const player = players[index];
            try {
                await fetch(`${API_BASE}/players/${encodeURIComponent(player.name)}`, {
                    method: 'DELETE'
                });
                await fetchPlayers();
                renderLeaderboard();
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }
        
        // 导出全部数据到剪贴板 (CSV格式)
        async function exportData() {
            if (players.length === 0) {
                return;
            }
            
            // CSV 格式：玩家名称,胜利次数（无表头）
            let text = '';
            players.forEach(p => {
                text += `${p.name},${p.wins}\n`;
            });
            
            try {
                await navigator.clipboard.writeText(text);
                // 临时显示提示
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => btn.textContent = originalText, 1500);
            } catch (err) {
                // 忽略错误
            }
        }
        
        // 渲染排名榜
        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboardBody');
            const emptyState = document.getElementById('emptyState');
            
            if (players.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            tbody.innerHTML = players.map((player, index) => {
                const rankClass = index < 3 ? `rank-${index + 1}` : '';
                return `
                <tr>
                    <td class="rank ${rankClass}">#${index + 1}</td>
                    <td class="player-name">${escapeHtml(player.name)}</td>
                    <td>
                        <div class="score-controls">
                            <button class="score-btn lose-btn" onclick="subtractWin(${index})" title="胜利-1">-</button>
                            <span class="score-num win-num">${player.wins}</span>
                            <button class="score-btn win-btn" onclick="addWin(${index})" title="胜利+1">+</button>
                        </div>
                    </td>
                    <td>
                        <button class="delete-btn" onclick="deletePlayer(${index})">删除</button>
                    </td>
                </tr>
                `;
            }).join('');
        }
        
        // 转义HTML防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 页面加载时获取数据
        fetchPlayers().then(renderLeaderboard);
    </script>
</body>
</html>
